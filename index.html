html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting…</title>
<style>
  body { font-family: -apple-system, sans-serif; text-align: center; padding: 60px 20px; color: #333; }
  .spinner { margin: 20px auto; width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid #555; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: #06c; }
</style>
</head>
<body>
  <div class="spinner"></div>
  <p>Taking you to your media…</p>
  <p id="fallback" style="display:none;">
    If you're not redirected automatically,
    <a id="fallback-link" href="#">click here</a>.
  </p>

<script>
// This script reads the "code" from the URL (e.g. yourbookname.com/?code=ch1-intro-video)
// looks it up in media-links.json, and redirects the reader to the right video/audio file.
// If the primary link fails to load the page at all, readers can fall back manually.

// Checks whether a URL responds at all. Many video hosts block cross-origin
// inspection, so this is a best-effort check, not a guarantee the page is
// perfect -- it mainly catches DNS failures, dead domains, and 404s on
// hosts that allow it (like Archive.org, which does).
async function isReachable(url) {
  try {
    await fetch(url, { method: 'HEAD', mode: 'no-cors' });
    // no-cors requests always resolve without exposing status, but a
    // network-level failure (dead domain, DNS error) will throw instead.
    return true;
  } catch (err) {
    return false;
  }
}

async function redirect() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code') || window.location.pathname.replace(/^\/|\/$/g, '');

  if (!code) {
    document.body.innerHTML = "<p>No media code specified.</p>";
    return;
  }

  try {
    const res = await fetch('media-links.json');
    const data = await res.json();
    const entry = data[code];

    if (!entry) {
      document.body.innerHTML = "<p>Sorry, we couldn't find that media code. Please visit yourbookname.com/media for a full index.</p>";
      return;
    }

    // Default the visible fallback link to primary; we may switch it to
    // the archive backup below if primary looks unreachable.
    let target = entry.primary;
    document.getElementById('fallback-link').href = target;
    document.getElementById('fallback').style.display = 'block';

    // Try the primary host first. If its domain appears dead (not just a
    // slow load -- an actual network failure), fall back automatically
    // to the Archive.org backup copy instead.
    if (entry.primary) {
      const primaryOk = await isReachable(entry.primary);
      if (!primaryOk && entry.backup) {
        target = entry.backup;
        document.getElementById('fallback-link').href = target;
      }
    } else if (entry.backup) {
      target = entry.backup;
    }

    setTimeout(() => { window.location.href = target; }, 400);

  } catch (err) {
    document.body.innerHTML = "<p>Something went wrong loading this link. Please visit yourbookname.com/media for a full index.</p>";
  }
}

redirect();
</script>
</body>
</html>
